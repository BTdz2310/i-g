stages:
  - test
  - security
  - build

variables:
  NODE_VERSION: "20"

# Cache node_modules giữa các job
.node_cache: &node_cache
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - node_modules/
    policy: pull

# ─── Install ────────────────────────────────────────────────
install:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - node_modules/
    policy: pull-push
  script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile

# ─── Lint ───────────────────────────────────────────────────
lint:
  stage: test
  image: node:20-alpine
  <<: *node_cache
  needs: [install]
  script:
    - npm install -g pnpm
    - pnpm lint

# ─── Unit Tests ─────────────────────────────────────────────
test:
  stage: test
  image: node:20-alpine
  <<: *node_cache
  needs: [install]
  script:
    - npm install -g pnpm
    - pnpm test:cov
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days

# ─── SAST ───────────────────────────────────────────────────
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

# ─── Build ──────────────────────────────────────────────────
build:
  stage: build
  image: node:20-alpine
  <<: *node_cache
  needs: [install]
  script:
    - npm install -g pnpm
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - main
    - feat/*
